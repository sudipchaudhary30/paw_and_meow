version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: pawhome
    volumes:
      - mongo_data:/data/db
    networks:
      - pawhome_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/pawhome
      JWT_SECRET: super_secure_coursework_jwt_secret_key_2026!
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      - mongodb
    networks:
      - pawhome_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - pawhome_net

volumes:
  mongo_data:

networks:
  pawhome_net:
    driver: bridge

